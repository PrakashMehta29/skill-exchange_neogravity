<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillSwap | Hyperlocal Skill Exchange</title>
    <meta name="description" content="Trade skills with your neighbors. No money, just pure exchange of value.">
    
    <!-- Google Fonts: Outfit for modern, premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons for premium icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <!-- Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="global-loader" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white;">
        <i class="ph-arrows-left-right ph-duotone text-gradient" style="font-size: 80px; animation: pulseLoader 1.5s infinite;"></i>
        <h2 style="margin-top: 16px; font-family: 'Outfit', sans-serif;">Loading...</h2>
    </div>

    <div id="radar-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); z-index: 9998; flex-direction: column; justify-content: center; align-items: center; color: white;">
        <div style="position: relative; width: 200px; height: 200px; border-radius: 50%; border: 2px solid var(--primary-glow); display: flex; justify-content: center; align-items: center; overflow: hidden;">
            <i class="ph-map-pin ph-fill text-gradient" style="font-size: 40px; z-index: 2;"></i>
            <div style="position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, transparent 70%, var(--primary-glow) 100%); animation: radarSpin 2s linear infinite;"></div>
            <div style="position: absolute; width: 1px; height: 50%; top: 0; background: var(--primary-color); animation: radarSpin 2s linear infinite; transform-origin: bottom center;"></div>
        </div>
        <h2 style="margin-top: 32px; font-family: 'Outfit', sans-serif;" class="text-gradient">Scanning area...</h2>
        <p style="color: var(--text-secondary); margin-top: 8px;">Finding traders within 5km</p>
    </div>

    <div id="app" class="app-container">
        <!-- Views will be injected here -->
    </div>
    
    <!-- Toast notifications container -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
